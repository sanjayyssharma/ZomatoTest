<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator UI</title>
  <style>
    :root {
      --window-blue-start: #0a6bff;
      --window-blue-end: #0040a8;
      --panel-bg: #f5f1de;
      --panel-edge: #ddd7c0;
      --field-bg: #fefcf3;
      --field-border: #c1b89b;
      --button-bg: #fbf8eb;
      --button-border: #6f8fbf;
      --button-shadow: #ffffff;
      --text: #2f2d25;
      --muted: #6c685a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #d7e4f8;
      font-family: Tahoma, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .window {
      width: 382px;
      border: 1px solid #003c97;
      background: var(--panel-bg);
      box-shadow: 0 0 0 1px #8bb3ff;
    }

    .title-bar {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 0 8px;
      color: #fff;
      background: linear-gradient(90deg, var(--window-blue-start), var(--window-blue-end));
      font-size: 13px;
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
    }

    .title-controls {
      display: flex;
      gap: 4px;
    }

    .title-btn {
      width: 22px;
      height: 20px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: linear-gradient(#4b97ff, #1b62df);
      display: grid;
      place-items: center;
      font-size: 12px;
      line-height: 1;
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.6);
    }

    .title-btn.close {
      background: linear-gradient(#ff8b6c, #d54b1c);
    }

    .content {
      padding: 14px 12px 12px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 42%),
        var(--panel-bg);
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 8px;
      margin-bottom: 10px;
    }

    fieldset {
      margin: 0;
      padding: 8px 10px 10px;
      border: 1px solid var(--panel-edge);
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
    }

    legend {
      padding: 0 4px;
      font-size: 12px;
      color: #4f6f94;
    }

    .radio-list {
      display: grid;
      gap: 10px;
      font-size: 12px;
      padding-top: 2px;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .radio-item input {
      margin: 0;
      accent-color: #3d77cc;
    }

    .display {
      height: 38px;
      border: 1px solid var(--field-border);
      background: linear-gradient(#fffef8, #f2ebd2);
      box-shadow: inset 1px 1px 0 #ffffff;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 8px;
      font-size: 31px;
      color: #3f3a31;
      letter-spacing: -1px;
      overflow: hidden;
    }

    .main-row {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 12px;
      align-items: start;
    }

    .operation-select {
      width: 110px;
      height: 24px;
      font-size: 12px;
      background: #fff;
      border: 1px solid #9f9f9f;
    }

    .right-panel {
      display: grid;
      gap: 12px;
    }

    .utility-row {
      display: flex;
      gap: 10px;
    }

    button {
      font: inherit;
      color: var(--text);
      background: linear-gradient(#fffdf4, #ece4c8);
      border: 1px solid var(--button-border);
      box-shadow:
        inset 1px 1px 0 var(--button-shadow),
        1px 1px 0 rgba(132, 151, 184, 0.35);
      border-radius: 3px;
      cursor: pointer;
    }

    button:active {
      box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.18);
      transform: translateY(1px);
    }

    button:disabled {
      color: #b7b2a4;
      border-color: #cfc9b5;
      cursor: not-allowed;
      background: linear-gradient(#fbf8ef, #f4eedb);
    }

    .utility-btn {
      width: 38px;
      height: 34px;
      font-size: 20px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px 12px;
    }

    .key {
      width: 38px;
      height: 34px;
      font-size: 22px;
      line-height: 1;
    }

    .key.zero {
      font-size: 40px;
      letter-spacing: -2px;
    }
  </style>
</head>
<body>
  <main class="window" aria-label="Calculator">
    <div class="title-bar">
      <span>Calculator</span>
      <div class="title-controls" aria-hidden="true">
        <span class="title-btn">_</span>
        <span class="title-btn">□</span>
        <span class="title-btn close">×</span>
      </div>
    </div>

    <section class="content">
      <div class="top-row">
        <fieldset>
          <legend>Selection</legend>
          <div class="radio-list">
            <label class="radio-item">
              <input type="radio" name="inputMode" checked>
              <span>Input from mouse and keyboard</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="inputMode">
              <span>Input from mouse only</span>
            </label>
          </div>
        </fieldset>

        <div class="display" id="display">1278964</div>
      </div>

      <div class="main-row">
        <fieldset>
          <legend>Operations</legend>
          <select class="operation-select" id="operation">
            <option value="+">Addition</option>
            <option value="-">Subtraction</option>
            <option value="*">Multiplication</option>
            <option value="/">Division</option>
          </select>
        </fieldset>

        <div class="right-panel">
          <div class="utility-row">
            <button class="utility-btn" id="clearEntry" type="button">ce</button>
            <button class="utility-btn" type="button" disabled>c</button>
          </div>

          <div class="keypad">
            <button class="key" type="button" data-key="1">1</button>
            <button class="key" type="button" data-key="2">2</button>
            <button class="key" type="button" data-key="3">3</button>
            <button class="key" type="button" data-operator="/">/</button>

            <button class="key" type="button" data-key="4">4</button>
            <button class="key" type="button" data-key="5">5</button>
            <button class="key" type="button" data-key="6">6</button>
            <button class="key" type="button" data-operator="*">*</button>

            <button class="key" type="button" data-key="7">7</button>
            <button class="key" type="button" data-key="8">8</button>
            <button class="key" type="button" data-key="9">9</button>
            <button class="key" type="button" data-operator="-">-</button>

            <button class="key zero" type="button" data-key="0">0</button>
            <button class="key" type="button" id="equals">=</button>
            <button class="key" type="button" data-key=".">.</button>
            <button class="key" type="button" data-operator="+">+</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const display = document.getElementById("display");
    const operationSelect = document.getElementById("operation");
    const clearEntryButton = document.getElementById("clearEntry");
    const equalsButton = document.getElementById("equals");

    let currentValue = "1278964";
    let storedValue = null;
    let operator = operationSelect.value;
    let resetOnNextInput = false;

    function syncDisplay(value) {
      display.textContent = value;
    }

    function setOperator(nextOperator) {
      operator = nextOperator;
      operationSelect.value = nextOperator;
    }

    function appendValue(value) {
      if (resetOnNextInput) {
        currentValue = value === "." ? "0." : value;
        resetOnNextInput = false;
      } else if (value === "." && currentValue.includes(".")) {
        return;
      } else if (currentValue === "0" && value !== ".") {
        currentValue = value;
      } else {
        currentValue += value;
      }

      syncDisplay(currentValue);
    }

    function calculate() {
      if (storedValue === null) {
        storedValue = Number(currentValue);
        resetOnNextInput = true;
        return;
      }

      const left = storedValue;
      const right = Number(currentValue);
      let result = right;

      switch (operator) {
        case "+":
          result = left + right;
          break;
        case "-":
          result = left - right;
          break;
        case "*":
          result = left * right;
          break;
        case "/":
          result = right === 0 ? "Error" : left / right;
          break;
      }

      currentValue = String(result);
      storedValue = typeof result === "number" ? result : null;
      resetOnNextInput = true;
      syncDisplay(currentValue);
    }

    document.querySelectorAll("[data-key]").forEach((button) => {
      button.addEventListener("click", () => appendValue(button.dataset.key));
    });

    document.querySelectorAll("[data-operator]").forEach((button) => {
      button.addEventListener("click", () => {
        setOperator(button.dataset.operator);
        storedValue = Number(currentValue);
        resetOnNextInput = true;
      });
    });

    operationSelect.addEventListener("change", (event) => {
      setOperator(event.target.value);
    });

    clearEntryButton.addEventListener("click", () => {
      currentValue = "0";
      storedValue = null;
      resetOnNextInput = false;
      syncDisplay(currentValue);
    });

    equalsButton.addEventListener("click", calculate);
  </script>
</body>
</html>
