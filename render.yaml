services:
  - type: web
    name: restaurant-recommender-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn phase6.backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
